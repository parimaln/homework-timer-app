<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Homework Timer</title>
    <style>
      :root {
        color-scheme: dark;
        --app-type-rotation-ms: 3200ms;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #0f1115;
        color: #e6e7eb;
        padding: 16px;
      }

      .app {
        width: min(520px, 100%);
        background: #171a21;
        border: 1px solid #2a2f3a;
        border-radius: 14px;
        padding: 24px;
        box-shadow: 0 16px 38px rgba(0, 0, 0, 0.35);
      }

      h1 {
        margin: 0;
        text-align: center;
        font-size: clamp(1.4rem, 2.7vw, 1.9rem);
        font-weight: 600;
      }

      .title-row {
        margin: 0 0 18px;
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: 10px;
      }

      .title-row > h1 {
        grid-column: 2;
      }

      .title-row > .icon-button {
        grid-column: 3;
        justify-self: end;
      }

      .icon-button {
        width: auto;
        min-width: 40px;
        padding: 8px 11px;
        background: #24314a;
        border-color: #34486d;
        color: #d5e4ff;
      }

      .icon-button:hover {
        background: #2a3a58;
      }

      .app-type-editor {
        margin-bottom: 16px;
        display: grid;
        gap: 10px;
      }

      .app-type-input-row {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .app-type-input-wrap {
        position: relative;
        flex: 1;
      }

      .app-type-input-wrap.has-value .app-type-example {
        opacity: 0;
      }

      .app-type-input {
        font-size: 1.05rem;
        padding: 14px 12px;
      }

      .app-type-example {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        color: #7f889c;
        pointer-events: none;
        animation: appTypePlaceholderDrift var(--app-type-rotation-ms, 3200ms) ease-in-out infinite alternate;
        transition: opacity 0.18s ease-out;
      }

      .app-type-input:focus + .app-type-example {
        opacity: 0;
      }

      .app-type-suffix {
        color: #c4c9d4;
        font-weight: 600;
        white-space: nowrap;
      }

      @keyframes appTypePlaceholderDrift {
        from {
          transform: translateY(-62%);
        }
        to {
          transform: translateY(-38%);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .app-type-example {
          animation: none;
          transition: none;
        }
      }

      .controls {
        display: grid;
        gap: 12px;
      }

      label {
        display: grid;
        gap: 6px;
        font-size: 0.92rem;
        color: #c4c9d4;
      }

      input,
      button {
        width: 100%;
        border-radius: 10px;
        border: 1px solid #343b48;
        background: #11141b;
        color: #f1f3f7;
        padding: 11px 12px;
        font-size: 1rem;
      }

      input:focus,
      button:focus {
        outline: 2px solid #4f8cff;
        outline-offset: 1px;
      }

      button {
        background: #2d6bf8;
        border-color: #2d6bf8;
        cursor: pointer;
        font-weight: 600;
      }

      button:hover {
        background: #2560e4;
      }

      .btn-danger {
        background: #3a1a1a;
        border-color: #6b2626;
        color: #f87171;
        margin-top: 16px;
      }

      .btn-danger:hover {
        background: #4d2020;
      }

      .btn-secondary {
        background: #24314a;
        border-color: #34486d;
        color: #d5e4ff;
      }

      .btn-secondary:hover {
        background: #2a3a58;
      }

      .timer {
        margin-top: 20px;
        border-top: 1px solid #2a2f3a;
        padding-top: 16px;
        text-align: center;
      }

      .timer-actions {
        margin-top: 16px;
      }

      .timer-actions,
      .break-controls {
        display: grid;
        gap: 10px;
      }

      .countdown {
        font-size: clamp(2rem, 6vw, 3rem);
        letter-spacing: 0.04em;
        font-variant-numeric: tabular-nums;
        margin: 0;
      }

      .meta,
      .status {
        margin: 9px 0 0;
        color: #aeb6c6;
        font-size: 0.95rem;
      }

      .hidden {
        display: none;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      @media (max-width: 480px) {
        .app {
          padding: 18px;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <div class="title-row">
        <h1 id="appTitle">Homework Timer</h1>
        <button id="editAppTypeButton" type="button" class="icon-button" aria-label="Edit app type">✎ Edit</button>
      </div>

      <section id="appTypeEditor" class="app-type-editor hidden" aria-label="Edit app type">
        <label for="appTypeInput">
          App Type
          <div class="app-type-input-row">
            <div id="appTypeInputWrap" class="app-type-input-wrap">
              <input id="appTypeInput" class="app-type-input" type="text" aria-describedby="appTypeExamplesHelp" />
              <span id="appTypeExample" class="app-type-example" aria-hidden="true">homework</span>
            </div>
            <span class="app-type-suffix">Timer</span>
          </div>
        </label>
        <p id="appTypeExamplesHelp" class="sr-only">Examples: homework, office work, house chores, project work.</p>
        <button id="saveAppTypeButton" type="button">Save</button>
      </section>

      <section id="setup" class="controls">
        <label for="totalMinutes">
          Total Time (minutes)
          <input id="totalMinutes" type="number" min="1" step="1" inputmode="numeric" placeholder="e.g. 40" required />
        </label>

        <label for="intervalMinutes">
          Interval Reminder (minutes)
          <input id="intervalMinutes" type="number" min="1" step="1" inputmode="numeric" placeholder="e.g. 5" required />
        </label>

        <label for="taskName">
          Task (optional)
          <input id="taskName" type="text" maxlength="120" placeholder="e.g. Math homework" />
        </label>

        <button id="startButton" type="button">Play / Start</button>
      </section>

      <section id="timerSection" class="timer hidden" aria-live="polite">
        <p id="countdown" class="countdown">00:00</p>
        <p id="meta" class="meta"></p>
        <div class="timer-actions">
          <button id="pauseButton" type="button" class="btn-secondary">Pause</button>
          <div class="break-controls">
            <label for="breakMinutes">
              Break Length (minutes)
              <input
                id="breakMinutes"
                type="number"
                min="1"
                max="10"
                step="1"
                inputmode="numeric"
                placeholder="1-10"
                aria-label="Break Length (minutes)"
              />
            </label>
            <button id="breakButton" type="button" class="btn-secondary">Start Break</button>
          </div>
          <button id="resetButton" type="button" class="btn-danger" style="margin-top: 0;">Stop / Reset</button>
        </div>
      </section>

      <p id="status" class="status" aria-live="polite"></p>
    </main>

    <script>
      (() => {
        const STORAGE_KEY = 'homeworkTimerState';
        const APP_TYPE_STORAGE_KEY = 'homeworkTimerAppType';
        const SERVICE_WORKER_PATH = './service-worker.js';
        const MAX_BREAK_MINUTES = 10;
        const APP_TYPE_MAX_LENGTH = 40;
        const APP_TYPE_EXAMPLE_ROTATION_MS = 3200;
        const DEFAULT_APP_TYPE = 'Homework';
        const APP_TYPE_EXAMPLES = ['homework', 'office work', 'house chores', 'project work'];

        const appTitle = document.getElementById('appTitle');
        const editAppTypeButton = document.getElementById('editAppTypeButton');
        const appTypeEditor = document.getElementById('appTypeEditor');
        const appTypeInputWrap = document.getElementById('appTypeInputWrap');
        const appTypeInput = document.getElementById('appTypeInput');
        const appTypeExample = document.getElementById('appTypeExample');
        const saveAppTypeButton = document.getElementById('saveAppTypeButton');
        const setup = document.getElementById('setup');
        const timerSection = document.getElementById('timerSection');
        const totalMinutesInput = document.getElementById('totalMinutes');
        const intervalMinutesInput = document.getElementById('intervalMinutes');
        const taskNameInput = document.getElementById('taskName');
        const startButton = document.getElementById('startButton');
        const pauseButton = document.getElementById('pauseButton');
        const breakMinutesInput = document.getElementById('breakMinutes');
        const breakButton = document.getElementById('breakButton');
        const resetButton = document.getElementById('resetButton');
        const countdown = document.getElementById('countdown');
        const meta = document.getElementById('meta');
        const status = document.getElementById('status');

        let timerState = null;
        let tickHandle = null;
        let sharedAudioContext = null;
        let serviceWorkerReady = Promise.resolve(null);
        let appTypeExampleIndex = 0;
        let currentHeadingAppType = DEFAULT_APP_TYPE;
        const prefersReducedMotionQuery = window.matchMedia
          ? window.matchMedia('(prefers-reduced-motion: reduce)')
          : null;

        const shouldReduceMotion = () => Boolean(prefersReducedMotionQuery && prefersReducedMotionQuery.matches);

        const normalizeAppType = (value) => {
          if (typeof value !== 'string') {
            return '';
          }
          return value.trim().replace(/\s+/g, ' ').slice(0, APP_TYPE_MAX_LENGTH);
        };

        const toTitleCase = (value) =>
          value
            .split(' ')
            .filter(Boolean)
            .map((word) => `${word.charAt(0).toUpperCase()}${word.slice(1).toLowerCase()}`)
            .join(' ');

        const getHeadingAppType = (value) => {
          const normalized = normalizeAppType(value);
          return normalized ? toTitleCase(normalized) : DEFAULT_APP_TYPE;
        };

        const getAppHeading = (value) => `${getHeadingAppType(value)} Timer`;

        const applyAppType = (value) => {
          currentHeadingAppType = getHeadingAppType(value);
          const heading = getAppHeading(value);
          appTitle.textContent = heading;
          document.title = heading;
        };

        const loadAppType = () => {
          let storedAppType = '';
          try {
            storedAppType = localStorage.getItem(APP_TYPE_STORAGE_KEY) || '';
          } catch {
            // Storage unavailable — fallback to default app type
          }
          applyAppType(storedAppType);
        };

        const syncAppTypeExampleVisibility = () => {
          appTypeInputWrap.classList.toggle('has-value', appTypeInput.value.trim().length > 0);
        };

        const rotateAppTypeExample = () => {
          appTypeExample.textContent = APP_TYPE_EXAMPLES[appTypeExampleIndex];
          appTypeExampleIndex = (appTypeExampleIndex + 1) % APP_TYPE_EXAMPLES.length;
        };

        if ('serviceWorker' in navigator) {
          serviceWorkerReady = navigator.serviceWorker
            .register(SERVICE_WORKER_PATH)
            .then(() => navigator.serviceWorker.ready)
            .catch(() => null);

          navigator.serviceWorker.addEventListener('message', (event) => {
            const data = event.data;
            if (!data || typeof data !== 'object') {
              return;
            }

            if (data.type === 'TIMER_REMINDER') {
              if (document.visibilityState === 'visible') {
                playChime(false);
              }
            }

            if (data.type === 'TIMER_COMPLETE') {
              if (timerState) {
                if (document.visibilityState === 'visible') {
                  playChime(true);
                }
                clearInterval(tickHandle);
                tickHandle = null;
                clearState();
                showSetup();
              }
            }

            if (data.type === 'TIMER_STATE_UPDATE' && timerState) {
              const nextReminderCount = Number(data.lastReminderCount);
              if (
                Number.isFinite(nextReminderCount) &&
                Number.isInteger(nextReminderCount) &&
                nextReminderCount >= timerState.lastReminderCount
              ) {
                timerState.lastReminderCount = nextReminderCount;
                saveState();
              }
            }

            if (typeof data.statusMessage === 'string') {
              status.textContent = data.statusMessage;
            }
          });
        }

        editAppTypeButton.addEventListener('click', () => {
          const shouldShow = appTypeEditor.classList.contains('hidden');
          appTypeEditor.classList.toggle('hidden');
          if (shouldShow) {
            appTypeInput.value = '';
            syncAppTypeExampleVisibility();
            appTypeInput.focus();
          }
        });

        appTypeInput.addEventListener('input', syncAppTypeExampleVisibility);

        saveAppTypeButton.addEventListener('click', () => {
          const nextAppType = normalizeAppType(appTypeInput.value);
          if (!nextAppType) {
            status.textContent = 'Please enter a name for your timer (e.g., Homework, Office Work).';
            appTypeInput.focus();
            return;
          }

          try {
            localStorage.setItem(APP_TYPE_STORAGE_KEY, nextAppType);
          } catch {
            // Storage unavailable — still update in current session
          }

          applyAppType(nextAppType);
          appTypeInput.value = '';
          syncAppTypeExampleVisibility();
          appTypeEditor.classList.add('hidden');
          status.textContent = 'App type saved.';
        });

        document.documentElement.style.setProperty('--app-type-rotation-ms', `${APP_TYPE_EXAMPLE_ROTATION_MS}ms`);
        appTypeInput.maxLength = APP_TYPE_MAX_LENGTH;
        if (shouldReduceMotion()) {
          appTypeExample.textContent = APP_TYPE_EXAMPLES[0];
        } else {
          rotateAppTypeExample();
          setInterval(rotateAppTypeExample, APP_TYPE_EXAMPLE_ROTATION_MS);
        }
        loadAppType();

        const toDisplay = (seconds) => {
          const safeSeconds = Math.max(0, seconds);
          const minutes = Math.floor(safeSeconds / 60);
          const secs = safeSeconds % 60;
          return `${String(minutes).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        };

        const toMinutesText = (seconds) => {
          const mins = Math.floor(seconds / 60);
          const secs = seconds % 60;
          const minuteLabel = mins === 1 ? 'minute' : 'minutes';
          const secondLabel = secs === 1 ? 'second' : 'seconds';
          return secs === 0 ? `${mins} ${minuteLabel}` : `${mins} ${minuteLabel} ${secs} ${secondLabel}`;
        };

        const normalizeTaskName = (value) => {
          if (typeof value !== 'string') {
            return '';
          }
          return value.trim().slice(0, 120);
        };

        const taskNotificationPrefix = (taskName) => (taskName ? `Task: ${taskName}. ` : '');

        const showDesktopNotification = (title, body) => {
          if (!('Notification' in window) || Notification.permission !== 'granted') {
            return;
          }
          try {
            new Notification(title, { body });
          } catch {
            // Notification API unavailable in this context — continue silently
          }
        };

        const saveState = () => {
          if (!timerState) {
            return;
          }
          try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(timerState));
          } catch {
            // Storage unavailable (e.g. private browsing quota) — continue in-memory only
          }
        };

        const clearState = () => {
          try {
            localStorage.removeItem(STORAGE_KEY);
          } catch {
            // Storage unavailable — ignore
          }
          timerState = null;
        };

        const postTimerStateToServiceWorker = (type) => {
          if (!('serviceWorker' in navigator)) {
            return;
          }

          serviceWorkerReady
            .then((registration) => {
              const targetWorker = registration && registration.active;
              if (!targetWorker) {
                return;
              }

              targetWorker.postMessage({
                type,
                timerState: timerState
                  ? {
                      totalSeconds: timerState.totalSeconds,
                      intervalSeconds: timerState.intervalSeconds,
                      startTime: timerState.startTime,
                      endTime: timerState.endTime,
                      lastReminderCount: timerState.lastReminderCount,
                      taskName: timerState.taskName,
                    }
                  : null,
              });
            })
            .catch(() => {
              // Service worker unavailable — continue without background notifications
            });
        };

        const playChime = (isFinal) => {
          const AudioContextClass = window.AudioContext || window.webkitAudioContext;
          if (!AudioContextClass) {
            return;
          }

          try {
            if (!sharedAudioContext || sharedAudioContext.state === 'closed') {
              sharedAudioContext = new AudioContextClass();
            }
            if (sharedAudioContext.state === 'suspended') {
              sharedAudioContext.resume();
            }

            const audioContext = sharedAudioContext;
            const base = audioContext.currentTime;
            const tones = isFinal
              ? [
                  { freq: 660, at: 0, length: 0.18 },
                  { freq: 880, at: 0.2, length: 0.24 },
                ]
              : [{ freq: 660, at: 0, length: 0.18 }];

            tones.forEach((tone) => {
              const oscillator = audioContext.createOscillator();
              const gain = audioContext.createGain();
              oscillator.type = 'sine';
              oscillator.frequency.value = tone.freq;
              gain.gain.setValueAtTime(0.0001, base + tone.at);
              gain.gain.exponentialRampToValueAtTime(0.18, base + tone.at + 0.03);
              gain.gain.exponentialRampToValueAtTime(0.0001, base + tone.at + tone.length);
              oscillator.connect(gain);
              gain.connect(audioContext.destination);
              oscillator.start(base + tone.at);
              oscillator.stop(base + tone.at + tone.length);
            });
          } catch {
            // Audio not available — silently continue
          }
        };

        const showSetup = () => {
          setup.classList.remove('hidden');
          timerSection.classList.add('hidden');
        };

        const showTimer = () => {
          setup.classList.add('hidden');
          timerSection.classList.remove('hidden');
        };

        const syncTicking = () => {
          clearInterval(tickHandle);
          tickHandle = null;
          if (!timerState || (timerState.isPaused && !timerState.isBreakActive)) {
            return;
          }
          tickHandle = setInterval(updateView, 1000);
        };

        const updateView = () => {
          if (!timerState) {
            return;
          }

          pauseButton.textContent = timerState.isPaused ? 'Resume' : 'Pause';
          pauseButton.disabled = timerState.isBreakActive;
          breakButton.disabled = !timerState.isPaused || timerState.isBreakActive;
          breakMinutesInput.disabled = !timerState.isPaused || timerState.isBreakActive;

          const now = Date.now();

          if (timerState.isBreakActive) {
            const breakRemainingSeconds = Math.max(0, Math.ceil((timerState.breakEndTime - now) / 1000));
            timerState.breakRemainingSeconds = breakRemainingSeconds;
            countdown.textContent = toDisplay(breakRemainingSeconds);
            meta.textContent = `On break: ${toMinutesText(breakRemainingSeconds)} • ${currentHeadingAppType} remaining: ${toMinutesText(
              timerState.remainingSeconds
            )}`;

            if (breakRemainingSeconds <= 0) {
              timerState.isBreakActive = false;
              timerState.breakEndTime = null;
              timerState.breakTotalSeconds = 0;
              timerState.breakRemainingSeconds = 0;
              timerState.isPaused = false;
              timerState.endTime = Date.now() + timerState.remainingSeconds * 1000;
              status.textContent = 'Break complete. Timer resumed.';
              saveState();
              syncTicking();
              postTimerStateToServiceWorker('START_TIMER');
              updateView();
            }
            return;
          }

          if (timerState.isPaused) {
            countdown.textContent = toDisplay(timerState.remainingSeconds);
            meta.textContent = `Paused • Remaining: ${toMinutesText(timerState.remainingSeconds)}`;
            return;
          }

          const remainingSeconds = Math.max(0, Math.ceil((timerState.endTime - now) / 1000));
          const elapsedSeconds = timerState.totalSeconds - remainingSeconds;

          timerState.remainingSeconds = remainingSeconds;
          countdown.textContent = toDisplay(remainingSeconds);
          meta.textContent = `Elapsed: ${toMinutesText(elapsedSeconds)} • Remaining: ${toMinutesText(remainingSeconds)}`;

          // In-page reminder fallback: fires when the service worker is not controlling the page
          if (!('serviceWorker' in navigator) || !navigator.serviceWorker.controller) {
            const intervalCount = Math.floor(elapsedSeconds / timerState.intervalSeconds);
            if (intervalCount > timerState.lastReminderCount) {
              timerState.lastReminderCount = intervalCount;
              playChime(false);
              const reminderBody = `${taskNotificationPrefix(timerState.taskName)}${toMinutesText(elapsedSeconds)} elapsed, ${toMinutesText(remainingSeconds)} remaining.`;
              status.textContent = `Reminder: ${reminderBody}`;
              saveState();
            }
          }

          if (remainingSeconds <= 0) {
            playChime(true);
            status.textContent = 'Session complete.';
            clearInterval(tickHandle);
            tickHandle = null;
            postTimerStateToServiceWorker('RESET_TIMER');
            clearState();
            showSetup();
            return;
          }
        };

        const startTimer = (state) => {
          timerState = state;
          timerState.isPaused = Boolean(timerState.isPaused);
          timerState.isBreakActive = Boolean(timerState.isBreakActive);
          timerState.breakEndTime = typeof timerState.breakEndTime === 'number' ? timerState.breakEndTime : null;
          timerState.breakTotalSeconds = Number.isInteger(timerState.breakTotalSeconds) ? timerState.breakTotalSeconds : 0;
          timerState.breakRemainingSeconds = Number.isInteger(timerState.breakRemainingSeconds)
            ? timerState.breakRemainingSeconds
            : 0;
          timerState.taskName = normalizeTaskName(timerState.taskName);
          timerState.remainingSeconds = Number.isInteger(timerState.remainingSeconds)
            ? timerState.remainingSeconds
            : timerState.totalSeconds;
          saveState();
          showTimer();
          updateView();
          syncTicking();
          postTimerStateToServiceWorker('START_TIMER');
        };

        const restoreTimer = () => {
          let raw;
          try {
            raw = localStorage.getItem(STORAGE_KEY);
          } catch {
            // Storage unavailable — start fresh
            showSetup();
            return;
          }

          if (!raw) {
            showSetup();
            return;
          }

          try {
            const parsed = JSON.parse(raw);
            if (!parsed || typeof parsed !== 'object') {
              clearState();
              showSetup();
              return;
            }

            let restoreStatusMessage = '';
            const totalSeconds = parsed.totalSeconds;
            const intervalSeconds = parsed.intervalSeconds;
            const startTime = parsed.startTime;
            const endTime = parsed.endTime;
            parsed.taskName = normalizeTaskName(parsed.taskName);

            if (
              !Number.isFinite(totalSeconds) ||
              !Number.isFinite(intervalSeconds) ||
              !Number.isFinite(startTime) ||
              !Number.isInteger(totalSeconds) ||
              !Number.isInteger(intervalSeconds) ||
              !Number.isInteger(startTime) ||
              totalSeconds <= 0 ||
              intervalSeconds <= 0 ||
              intervalSeconds > totalSeconds ||
              (!parsed.isPaused &&
                (!Number.isFinite(endTime) || !Number.isInteger(endTime) || endTime <= startTime))
            ) {
              clearState();
              showSetup();
              return;
            }

            if (!parsed.isPaused && Date.now() >= parsed.endTime) {
              status.textContent = 'Session complete while tab was closed.';
              showDesktopNotification(
                `${currentHeadingAppType} timer complete`,
                `${taskNotificationPrefix(parsed.taskName)}Time is up. Great work finishing your session!`
              );
              if (document.visibilityState === 'visible') {
                playChime(true);
              }
              postTimerStateToServiceWorker('RESET_TIMER');
              clearState();
              showSetup();
              return;
            }

            const restoredReminderCount = Number(parsed.lastReminderCount);
            parsed.lastReminderCount =
              Number.isInteger(restoredReminderCount) && restoredReminderCount >= 0 ? restoredReminderCount : 0;
            parsed.remainingSeconds =
              parsed.isPaused || typeof parsed.endTime !== 'number'
                ? typeof parsed.remainingSeconds === 'number'
                  ? Math.max(0, Math.floor(parsed.remainingSeconds))
                  : parsed.totalSeconds
                : Math.max(0, Math.ceil((parsed.endTime - Date.now()) / 1000));

            if (!parsed.isPaused && parsed.intervalSeconds > 0) {
              const elapsedSeconds = Math.max(0, parsed.totalSeconds - parsed.remainingSeconds);
              const intervalCount = Math.floor(elapsedSeconds / parsed.intervalSeconds);
              if (intervalCount > parsed.lastReminderCount) {
                parsed.lastReminderCount = intervalCount;
                const reminderBody = `${taskNotificationPrefix(parsed.taskName)}${toMinutesText(elapsedSeconds)} elapsed, ${toMinutesText(parsed.remainingSeconds)} remaining.`;
                restoreStatusMessage = `Reminder: ${reminderBody}`;
                showDesktopNotification(`${currentHeadingAppType} timer reminder`, reminderBody);
                if (document.visibilityState === 'visible') {
                  playChime(false);
                }
              }
            }

            if (parsed.isBreakActive && typeof parsed.breakEndTime === 'number' && Date.now() >= parsed.breakEndTime) {
              parsed.isBreakActive = false;
              parsed.breakEndTime = null;
              parsed.breakTotalSeconds = 0;
              parsed.breakRemainingSeconds = 0;
              parsed.isPaused = false;
              parsed.endTime = Date.now() + parsed.remainingSeconds * 1000;
            }

            status.textContent =
              restoreStatusMessage ||
              (parsed.isBreakActive
                ? 'Restored break from previous session.'
                : parsed.isPaused
                  ? 'Restored paused timer from previous session.'
                  : 'Resumed running timer from previous session.');
            startTimer(parsed);
          } catch {
            clearState();
            showSetup();
          }
        };

        startButton.addEventListener('click', async () => {
          const totalMinutes = Number(totalMinutesInput.value);
          const intervalMinutes = Number(intervalMinutesInput.value);
          const taskName = normalizeTaskName(taskNameInput.value);

          if (
            !Number.isFinite(totalMinutes) ||
            !Number.isFinite(intervalMinutes) ||
            !Number.isInteger(totalMinutes) ||
            !Number.isInteger(intervalMinutes) ||
            totalMinutes <= 0 ||
            intervalMinutes <= 0
          ) {
            status.textContent = 'Enter valid positive whole-minute values for total time and interval.';
            return;
          }

          if (intervalMinutes > totalMinutes) {
            status.textContent = 'Reminder interval must be less than or equal to the total time.';
            return;
          }

          // Create AudioContext during this user gesture so it is allowed to play later
          const AudioContextClass = window.AudioContext || window.webkitAudioContext;
          if (AudioContextClass && (!sharedAudioContext || sharedAudioContext.state === 'closed')) {
            try {
              sharedAudioContext = new AudioContextClass();
            } catch {
              // Audio not available — continue without it
            }
          }

          if ('Notification' in window && Notification.permission === 'default') {
            try {
              await Notification.requestPermission();
            } catch {
              status.textContent = 'Notification permission prompt failed. Timer will still run with chime alerts.';
            }
          }

          const totalSeconds = totalMinutes * 60;
          const intervalSeconds = intervalMinutes * 60;
          const now = Date.now();

          const newState = {
            totalSeconds,
            intervalSeconds,
            startTime: now,
            endTime: now + totalSeconds * 1000,
            remainingSeconds: totalSeconds,
            lastReminderCount: 0,
            taskName,
            isPaused: false,
            isBreakActive: false,
            breakEndTime: null,
            breakTotalSeconds: 0,
            breakRemainingSeconds: 0,
          };

          status.textContent = 'Timer started.';
          startTimer(newState);
        });

        pauseButton.addEventListener('click', () => {
          if (!timerState) {
            return;
          }

          if (timerState.isBreakActive) {
            status.textContent = 'Wait for the current break to end.';
            return;
          }

          if (timerState.isPaused) {
            timerState.isPaused = false;
            timerState.endTime = Date.now() + timerState.remainingSeconds * 1000;
            status.textContent = 'Timer resumed.';
          } else {
            timerState.remainingSeconds = Math.max(0, Math.ceil((timerState.endTime - Date.now()) / 1000));
            timerState.isPaused = true;
            timerState.endTime = null;
            status.textContent = 'Timer paused.';
          }

          saveState();
          updateView();
          syncTicking();
          if (!timerState.isPaused) {
            postTimerStateToServiceWorker('START_TIMER');
          } else {
            postTimerStateToServiceWorker('RESET_TIMER');
          }
        });

        breakButton.addEventListener('click', () => {
          if (!timerState || !timerState.isPaused || timerState.isBreakActive) {
            status.textContent = 'Pause the timer before starting a break.';
            return;
          }

          const breakMinutesRaw = breakMinutesInput.value.trim();
          if (!breakMinutesRaw) {
            status.textContent = 'Enter a valid break length in minutes.';
            return;
          }

          const breakMinutes = Number(breakMinutesRaw);
          if (!Number.isFinite(breakMinutes)) {
            status.textContent = 'Enter a valid break length in minutes.';
            return;
          }

          if (!Number.isInteger(breakMinutes)) {
            status.textContent = 'Break length must be a whole number of minutes.';
            return;
          }

          if (breakMinutes <= 0) {
            status.textContent = 'Break length must be at least 1 minute.';
            return;
          }

          const maxBreakMinutes = Math.min(MAX_BREAK_MINUTES, Math.floor(timerState.remainingSeconds / 60));
          if (maxBreakMinutes <= 0) {
            status.textContent = 'No break time available from the remaining timer.';
            return;
          }

          if (breakMinutes > maxBreakMinutes) {
            status.textContent = `Break must be ${maxBreakMinutes} minute${maxBreakMinutes === 1 ? '' : 's'} or less.`;
            return;
          }

          const breakSeconds = breakMinutes * 60;
          timerState.isBreakActive = true;
          timerState.breakTotalSeconds = breakSeconds;
          timerState.breakRemainingSeconds = breakSeconds;
          timerState.breakEndTime = Date.now() + breakSeconds * 1000;
          status.textContent = `Break started for ${breakMinutes} minute${breakMinutes === 1 ? '' : 's'}.`;
          saveState();
          updateView();
          syncTicking();
          postTimerStateToServiceWorker('RESET_TIMER');
        });

        resetButton.addEventListener('click', () => {
          clearInterval(tickHandle);
          tickHandle = null;
          postTimerStateToServiceWorker('RESET_TIMER');
          clearState();
          status.textContent = 'Timer stopped.';
          showSetup();
        });

        restoreTimer();
      })();
    </script>
  </body>
</html>
